name: Daglig børsanalyse

on:
  schedule:
    - cron: "15 8 * * 1-5"   # 09:15 norsk vintertid (UTC+1)
    - cron: "30 12 * * 1-5"  # 13:30 norsk vintertid (UTC+1)
    - cron: "0 15 * * 5"     # 16:00 norsk vintertid (UTC+1, fredag)
    - cron: "15 7 * * 1-5"   # 09:15 norsk sommertid (UTC+2)
    - cron: "30 11 * * 1-5"  # 13:30 norsk sommertid (UTC+2)
    - cron: "0 14 * * 5"     # 16:00 norsk sommertid (UTC+2, fredag)
  workflow_dispatch:
    inputs:
      modus:
        description: "Kjøringsmodus"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - only-stop-loss
          - ukentlig-rapport
          - test-varsel

jobs:
  analyser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer avhengigheter
        run: pip install yfinance pandas cryptography

      - name: Bestem kjøringsmodus
        id: modus
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)   # 1=Man ... 5=Fre
          INPUT="${{ github.event.inputs.modus }}"
          if [ "$INPUT" = "test-varsel" ]; then
            echo "args=--test-varsel" >> $GITHUB_OUTPUT
            echo "label=Test varsel" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "only-stop-loss" ]; then
            echo "args=--only-stop-loss" >> $GITHUB_OUTPUT
            echo "label=Stop-loss-sjekk" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "ukentlig-rapport" ]; then
            echo "args=--ukentlig-rapport" >> $GITHUB_OUTPUT
            echo "label=Ukentlig rapport" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "full" ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "label=Full analyse" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ] || [ "$HOUR" = "11" ]; then
            echo "args=--only-stop-loss" >> $GITHUB_OUTPUT
            echo "label=Stop-loss-sjekk" >> $GITHUB_OUTPUT
          elif ([ "$HOUR" = "15" ] || [ "$HOUR" = "14" ]) && [ "$DAY" = "5" ]; then
            echo "args=--ukentlig-rapport" >> $GITHUB_OUTPUT
            echo "label=Ukentlig rapport" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
            echo "label=Full analyse" >> $GITHUB_OUTPUT
          fi

      - name: Installer Saxo-avhengigheter
        run: pip install requests PyNaCl

      - name: Kjør analyse (${{ steps.modus.outputs.label }})
        env:
          SAXO_CLIENT_ID:     ${{ secrets.SAXO_CLIENT_ID }}
          SAXO_CLIENT_SECRET: ${{ secrets.SAXO_CLIENT_SECRET }}
          SAXO_REFRESH_TOKEN: ${{ secrets.SAXO_REFRESH_TOKEN }}
          SAXO_ACCOUNT_KEY:   ${{ secrets.SAXO_ACCOUNT_KEY }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python scheduler.py ${{ steps.modus.outputs.args }}

      - name: Lagre oppdatert portefølje
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@tradingbot"
          git pull --rebase --autostash origin main
          git add portfolio.json
          git diff --staged --quiet || git commit -m "[${{ steps.modus.outputs.label }}] $(date +'%Y-%m-%d %H:%M')"
          git push
