name: Daglig børsanalyse

on:
  schedule:
    - cron: "0 5 * * 1-5"    # Morgen-loop: 07:00 sommer / 06:00 vinter Oslo — tidlig start gir buffer mot GitHub-forsinkelse
    - cron: "0 11 * * 1-5"   # Ettermiddag-loop: 13:00 sommer / 12:00 vinter Oslo
    - cron: "0 14 * * 5"     # Ukentlig rapport fredag 16:00 vintertid (UTC+1)
    - cron: "0 15 * * 5"     # Ukentlig rapport fredag 16:00 sommertid (UTC+2)
  workflow_dispatch:
    inputs:
      modus:
        description: "Kjøringsmodus"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - only-stop-loss
          - ukentlig-rapport
          - test-varsel

jobs:
  analyser:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Git-konfigurasjon
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@tradingbot"

      - name: Kjør analyse
        env:
          SAXO_CLIENT_ID:     ${{ secrets.SAXO_CLIENT_ID }}
          SAXO_CLIENT_SECRET: ${{ secrets.SAXO_CLIENT_SECRET }}
          SAXO_REFRESH_TOKEN: ${{ secrets.SAXO_REFRESH_TOKEN }}
          SAXO_ACCOUNT_KEY:   ${{ secrets.SAXO_ACCOUNT_KEY }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ github.event.inputs.modus }}"
          HOUR_UTC=$(date -u +%H)
          DAY_UTC=$(date -u +%u)   # 1=Man ... 5=Fre

          # ── Manuell enkelt-kjøring ───────────────────────────────────────────
          if [ "$INPUT" = "test-varsel" ]; then
            python scheduler.py --test-varsel; exit 0
          elif [ "$INPUT" = "only-stop-loss" ]; then
            python scheduler.py --only-stop-loss; exit 0
          elif [ "$INPUT" = "ukentlig-rapport" ]; then
            python scheduler.py --ukentlig-rapport; exit 0
          fi

          # ── Fredag ukentlig rapport (kl 14 eller 15 UTC) ─────────────────────
          if [ "$DAY_UTC" = "5" ] && { [ "$HOUR_UTC" = "14" ] || [ "$HOUR_UTC" = "15" ]; }; then
            python scheduler.py --ukentlig-rapport
            git pull --rebase --autostash origin main || true
            if grep -q '<<<<<<' portfolio.json 2>/dev/null; then
              echo "MERGE-KONFLIKT i portfolio.json — resetter til remote"
              git checkout origin/main -- portfolio.json
            fi
            git add portfolio.json
            git diff --staged --quiet || git commit -m "[Ukentlig rapport] $(date -u +'%Y-%m-%d %H:%M')"
            git push
            exit 0
          fi

          # ── Loop-modus (ordinær schedule-trigger hverdag) ────────────────────
          # Kjøres i maks 5t 20min — trygt under GitHub Actions 6t-grense
          START_EPOCH=$(date +%s)
          MAX_SECONDS=$(( 5 * 3600 + 20 * 60 ))
          FIRST_RUN=true

          while true; do
            # Sjekk maks kjøretid
            NOW_EPOCH=$(date +%s)
            if [ $(( NOW_EPOCH - START_EPOCH )) -ge $MAX_SECONDS ]; then
              echo "Maks kjøretid nådd — avslutter."
              break
            fi

            # Hent Oslo-tid i minutter siden midnatt
            OSLO_HHMM=$(TZ=Europe/Oslo date +%H%M)
            OSLO_H=${OSLO_HHMM:0:2}
            OSLO_M=${OSLO_HHMM:2:2}
            OSLO_TOD=$(( 10#$OSLO_H * 60 + 10#$OSLO_M ))

            # Vent til markedet åpner (09:00 = 540)
            if [ $OSLO_TOD -lt 540 ]; then
              WAIT=$(( (540 - OSLO_TOD) * 60 ))
              echo "Venter $(( WAIT / 60 )) min til markedet åpner (09:00 Oslo)..."
              sleep $WAIT
              continue
            fi

            # Markedet stengt (etter 16:30 = 990)
            if [ $OSLO_TOD -ge 990 ]; then
              echo "Markedet stengt ($(TZ=Europe/Oslo date +'%H:%M') Oslo) — avslutter."
              break
            fi

            # Bestem kjøringsmodus:
            # Full analyse første gang loopen starter (uansett tidspunkt)
            if [ "$FIRST_RUN" = "true" ]; then
              echo "=== Full analyse ($(TZ=Europe/Oslo date +'%H:%M') Oslo) ==="
              python scheduler.py
            else
              echo "=== Stop-loss sjekk ($(TZ=Europe/Oslo date +'%H:%M') Oslo) ==="
              python scheduler.py --only-stop-loss
            fi
            FIRST_RUN=false

            # Commit og push portfolio.json — abort if merge conflict corrupts the file
            git pull --rebase --autostash origin main || true
            if grep -q '<<<<<<' portfolio.json 2>/dev/null; then
              echo "MERGE-KONFLIKT i portfolio.json — resetter til remote-versjon"
              git checkout --theirs portfolio.json 2>/dev/null || git checkout origin/main -- portfolio.json
              python scheduler.py --only-stop-loss || true  # re-run to update with clean file
            fi
            git add portfolio.json
            git diff --staged --quiet || git commit -m "[Loop $(TZ=Europe/Oslo date +'%H:%M')] $(date -u +'%Y-%m-%d')"
            git push

            # Sov 30 minutter
            echo "Sover 30 min..."
            sleep 1800
          done
