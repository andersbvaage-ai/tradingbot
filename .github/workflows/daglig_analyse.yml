name: Daglig børsanalyse

on:
  schedule:
    - cron: "15 8 * * 1-5"   # Kl 09:15 norsk tid (UTC+1 vinter), mandag–fredag
  workflow_dispatch:           # Kan også kjøres manuelt fra GitHub

jobs:
  analyser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer avhengigheter
        run: pip install yfinance pandas cryptography

      - name: Kjør analyse
        env:
          # Nordnet live-trading (valgfritt — sett disse i GitHub Secrets for å aktivere)
          # Hvis ikke satt, kjøres analysen som vanlig uten live-utførelse
          NORDNET_API_KEY:  ${{ secrets.NORDNET_API_KEY }}
          NORDNET_PRIV_KEY: ${{ secrets.NORDNET_PRIV_KEY }}
        run: python scheduler.py

      - name: Lagre oppdatert portefølje
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@tradingbot"
          git fetch origin main
          git reset --soft origin/main
          git add portfolio.json
          git diff --staged --quiet || git commit -m "Daglig analyse $(date +'%Y-%m-%d')"
          git push
