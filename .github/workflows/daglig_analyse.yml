name: Daglig børsanalyse

on:
  schedule:
    - cron: "15 8 * * 1-5"   # 09:15 norsk tid — full analyse + kjøp
    - cron: "30 12 * * 1-5"  # 13:30 norsk tid — kun stop-loss-sjekk
  workflow_dispatch:
    inputs:
      modus:
        description: "Kjøringsmodus"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - only-stop-loss
          - test-varsel

jobs:
  analyser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer avhengigheter
        run: pip install yfinance pandas cryptography

      - name: Bestem kjøringsmodus
        id: modus
        run: |
          # Ettermiddagskjøringen (12:30 UTC) bruker --only-stop-loss
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          INPUT="${{ github.event.inputs.modus }}"
          if [ "$INPUT" = "test-varsel" ]; then
            echo "args=--test-varsel" >> $GITHUB_OUTPUT
            echo "label=Test varsel" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "only-stop-loss" ]; then
            echo "args=--only-stop-loss" >> $GITHUB_OUTPUT
            echo "label=Stop-loss-sjekk" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ]; then
            echo "args=--only-stop-loss" >> $GITHUB_OUTPUT
            echo "label=Stop-loss-sjekk" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
            echo "label=Full analyse" >> $GITHUB_OUTPUT
          fi

      - name: Kjør analyse (${{ steps.modus.outputs.label }})
        env:
          NORDNET_API_KEY:  ${{ secrets.NORDNET_API_KEY }}
          NORDNET_PRIV_KEY: ${{ secrets.NORDNET_PRIV_KEY }}
          NTFY_TOPIC:       ${{ secrets.NTFY_TOPIC }}
        run: python scheduler.py ${{ steps.modus.outputs.args }}

      - name: Lagre oppdatert portefølje
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@tradingbot"
          git fetch origin main
          git reset --soft origin/main
          git add portfolio.json
          git diff --staged --quiet || git commit -m "[${{ steps.modus.outputs.label }}] $(date +'%Y-%m-%d %H:%M')"
          git push
